

services:

  mysql:
    image: mysql:8.4

    container_name: event-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Satya@123
      MYSQL_DATABASE: event_booking

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-pSatya@123" ]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .

    container_name: event-management-app

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8080:8080"

volumes:
  mysql-data: